services:
  # 1. Express Backend API
  - type: web
    name: hantavirus-api
    env: node
    # Install pnpm, install dependencies, generate prisma client, and build turborepo
    buildCommand: npm install -g pnpm && pnpm install && pnpm run db:generate && pnpm run build
    startCommand: cd apps/api && pnpm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false # Must be added manually in Render dashboard from Supabase
      - key: REDIS_URL
        fromService:
          type: redis
          name: hantavirus-redis
          property: connectionString

  # 2. BullMQ Distributed Workers & Schedulers
  - type: worker
    name: hantavirus-workers
    env: node
    buildCommand: npm install -g pnpm && pnpm install && pnpm run db:generate && pnpm run build
    startCommand: cd apps/workers && pnpm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false # Must be added manually in Render dashboard from Supabase
      - key: REDIS_URL
        fromService:
          type: redis
          name: hantavirus-redis
          property: connectionString

  # 3. Redis Message Broker & Cache Server
  - type: redis
    name: hantavirus-redis
    ipAllowList: [] # internal connections only for security
    plan: free
